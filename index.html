function openLightbox(index) {
  currentSlide = index;
  zoomLevel = 1;
  document.getElementById('lightbox-img').src = galleryImages[currentSlide];
  document.getElementById('lightbox-img').style.transform = 'scale(' + zoomLevel + ')';
  document.getElementById('lightbox').style.display = 'block';
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}

function changeSlide(n) {
  currentSlide += n;
  if (currentSlide >= galleryImages.length) currentSlide = 0;
  if (currentSlide < 0) currentSlide = galleryImages.length - 1;
  document.getElementById('lightbox-img').src = galleryImages[currentSlide];
  document.getElementById('lightbox-img').style.transform = 'scale(' + zoomLevel + ')';
}

function zoomIn() {
  zoomLevel += 0.1;
  document.getElementById('lightbox-img').style.transform = 'scale(' + zoomLevel + ')';
}

function zoomOut() {
  if (zoomLevel > 0.1) zoomLevel -= 0.1;
  document.getElementById('lightbox-img').style.transform = 'scale(' + zoomLevel + ')';
}

document.addEventListener('keydown', function(e) {
  if (document.getElementById('lightbox').style.display === 'block') {
    if (e.key === 'ArrowLeft') changeSlide(-1);
    if (e.key === 'ArrowRight') changeSlide(1);
    if (e.key === 'Escape') closeLightbox();
  }
});

document.getElementById('lightbox-img').addEventListener('wheel', function(e) {
  e.preventDefault();
  if (e.deltaY < 0) zoomIn();
  else zoomOut();
});
